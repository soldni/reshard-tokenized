name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check version matches release tag
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "::error::Version mismatch: Cargo.toml has '${package_version}' but release tag is '${tag_version}'"
            exit 1
          fi
          echo "Version check passed: ${package_version}"

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  bump-version:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Compute and apply next minor version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          released="${tag#v}"
          current="$(sed -nE 's/^version = \"([^\"]+)\"/\1/p' Cargo.toml | head -n 1)"

          if [[ ! "${released}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be semver (vX.Y.Z or X.Y.Z). Got: ${tag}"
            exit 1
          fi

          IFS='.' read -r major minor _ <<< "${released}"
          next_version="${major}.$((minor + 1)).0"

          sed -i -E "0,/^version = \".*\"/s//version = \"${next_version}\"/" Cargo.toml

          if git diff --quiet -- Cargo.toml; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Bumped version: ${current} -> ${next_version}"
          echo "changed=true" >> "${GITHUB_OUTPUT}"
          echo "next_version=${next_version}" >> "${GITHUB_OUTPUT}"

      - name: Commit and push version bump
        if: steps.bump.outputs.changed == 'true'
        env:
          default_branch: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "Bump version to ${{ steps.bump.outputs.next_version }}"
          git push origin "HEAD:${default_branch}"
